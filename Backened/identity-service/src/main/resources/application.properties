# 1. Service Name & Port
spring.application.name=identity-service
server.port=8081

# 2. Database Connection (THIS WAS MISSING)
spring.datasource.url=jdbc:mysql://localhost:3306/outing_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_default}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate Settings (Auto-creates tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Eureka Connection
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}



spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000